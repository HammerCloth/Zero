services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zero-backend
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      DATABASE_PATH: /data/zero.db
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-this-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-secret}
    volumes:
      - zero_data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    container_name: zero-caddy
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_SITE: ${CADDY_SITE:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv/frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  zero_data:
  caddy_data:
  caddy_config:
