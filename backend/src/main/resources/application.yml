server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: zero-backend
  datasource:
    url: "jdbc:sqlite:${DATABASE_PATH:./data/zero.db}"
    driver-class-name: org.sqlite.JDBC
    hikari:
      connection-init-sql: "PRAGMA foreign_keys = ON"
  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/**/*.xml

app:
  env: ${APP_ENV:development}
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:dev-access-secret-change-in-production}
    refresh-secret: ${JWT_REFRESH_SECRET:dev-refresh-secret-change-in-production}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:3600}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:2592000}
  cors:
    origins: ${FRONTEND_ORIGIN:http://localhost:5173}
